name: lint-shell

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          VERSION=v0.11.0
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz" \
            | tar -xJf - --strip-components=1 -C /tmp "shellcheck-${VERSION}/shellcheck"
          sudo mv /tmp/shellcheck /usr/local/bin/shellcheck
      - name: Run lint
        run: make lint
