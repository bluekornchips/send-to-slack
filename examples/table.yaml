resource_types:
  - name: slack-notification
    type: registry-image
    source:
      repository: sunflowersoftware/send-to-slack
      tag: ((TAG))

resources:
  - name: slack-notification
    type: slack-notification
    source:
      slack_bot_user_oauth_token: ((SLACK_BOT_USER_OAUTH_TOKEN))

common_slack_params: &common_slack_params
  channel: ((channel))

jobs:
  - name: table-basic-with-raw-text-cells
    plan:
      - put: slack-notification
        
        params:
          <<: *common_slack_params
          blocks:
            - table:
                rows:
                  - - type: raw_text
                      text: "Project Name"
                    - type: raw_text
                      text: "Status"
                    - type: raw_text
                      text: "Completion Date"
                  - - type: raw_text
                      text: "Project Alpha"
                    - type: raw_text
                      text: "In Progress"
                    - type: raw_text
                      text: "2025-12-01"
                  - - type: raw_text
                      text: "Project Beta"
                    - type: raw_text
                      text: "Completed"
                    - type: raw_text
                      text: "2025-10-15"

  - name: table-with-all-features-column-settings-block-id-and-rich-text
    plan:
      - put: slack-notification
        
        params:
          <<: *common_slack_params
          blocks:
            - table:
                block_id: "deployment_status_table"
                column_settings:
                  - align: left
                    is_wrapped: true
                  - align: center
                    is_wrapped: false
                  - align: right
                    is_wrapped: false
                rows:
                  - - type: raw_text
                      text: "Feature"
                    - type: raw_text
                      text: "Status"
                    - type: raw_text
                      text: "Documentation"
                  - - type: raw_text
                      text: "Text Wrapping"
                    - type: raw_text
                      text: "Enabled"
                    - type: rich_text
                      elements:
                        - type: rich_text_section
                          elements:
                            - type: link
                              url: "https://api.slack.com/block-kit"
                              text: "Block Kit Docs"
                  - - type: raw_text
                      text: "Column Alignment"
                    - type: raw_text
                      text: "Center"
                    - type: rich_text
                      elements:
                        - type: rich_text_section
                          elements:
                            - type: text
                              text: "Right aligned "
                            - type: link
                              url: "https://slack.com"
                              text: "link"
                  - - type: raw_text
                      text: "Rich Text Formatting"
                    - type: rich_text
                      elements:
                        - type: rich_text_section
                          elements:
                            - type: text
                              text: "Bold"
                              style:
                                bold: true
                            - type: text
                              text: " and "
                            - type: text
                              text: "italic"
                              style:
                                italic: true
                    - type: rich_text
                      elements:
                        - type: rich_text_section
                          elements:
                            - type: text
                              text: "Visit "
                            - type: link
                              url: "https://api.slack.com/messaging/composing/layouts"
                              text: "Layout Guide"

  - name: table-size-10x5
    public: true
    plan:
      - task: prepare-table-10x5
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine
          run:
            path: sh
            args:
              - -c
              - |
                set -eo pipefail
                apk add --no-cache jq >/dev/null 2>&1
                mkdir -p workspace

                jq -n '
                  {
                    table: {
                      rows: [range(10) as $r |
                        [range(5) as $c |
                          {
                            type: "raw_text",
                            text: ("r\($r)c\($c)-" + ("x" * (10 + (($r * 5 + $c) % 91))))
                          }
                        ]
                      ]
                    }
                  }
                ' > workspace/table-10x5.json
          outputs:
            - name: workspace

      - put: slack-notification
        params:
          <<: *common_slack_params
          blocks:
            - from_file: workspace/table-10x5.json

  - name: table-size-40x14
    public: true
    plan:
      - task: prepare-table-40x14
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine
          run:
            path: sh
            args:
              - -c
              - |
                set -eo pipefail
                apk add --no-cache jq >/dev/null 2>&1
                mkdir -p workspace

                jq -n '
                  {
                    table: {
                      rows: [range(40) as $r |
                        [range(14) as $c |
                          {
                            type: "raw_text",
                            text: ("r\($r)c\($c) " + ("x" * (7 + (($r * 14 + $c) % 3))))
                          }
                        ]
                      ]
                    }
                  }
                ' > workspace/table-40x14.json
          outputs:
            - name: workspace

      - put: slack-notification
        params:
          <<: *common_slack_params
          blocks:
            - from_file: workspace/table-40x14.json
